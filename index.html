                let totalScore = 0;
                let totalMaxScore = 0;
                let recommendations = { highImpact: [], continuous: [] };
                let answerCounts = { yes: 0, partial: 0, planned: 0, no: 0, i_dont_know: 0 };

                data.categories.forEach(category => {
                    let categoryScore = 0;
                    let categoryMaxScore = 0;
                    
                    category.practices.forEach(practice => {
                        let practiceScore = 0;
                        let practiceMaxScore = 0;
                        practice.questions.forEach(question => {
                            const answer = answers[question.id];
                            const score = answer ? question.maturity_map[answer] : 0;
                            const maxScore = question.maturity_map['yes'];
                            
                            practiceScore += score;
                            practiceMaxScore += maxScore;

                            if(answer) answerCounts[answer]++;

                            const recommendation = {
                                text: question.recommendations[0],
                                category: category.name,
                                practice: practice.name,
                                question: question.text,
                                answer: answer,
                            };

                            if (answer === 'no' || answer === 'i_dont_know') {
                                recommendations.highImpact.push(recommendation);
                            } else if (answer === 'partial' || answer === 'planned') {
                                recommendations.continuous.push(recommendation);
                            }
                        });
                        
                        categoryScore += practiceScore;
                        categoryMaxScore += practiceMaxScore;
                        practiceScores[practice.name] = practiceMaxScore > 0 ? (practiceScore / practiceMaxScore) * 100 : 0;
                    });
                    
                    totalScore += categoryScore;
                    totalMaxScore += categoryMaxScore;
                    categoryScores[category.name] = categoryMaxScore > 0 ? (categoryScore / categoryMaxScore) * 100 : 0;
                });

                const overallMaturity = totalMaxScore > 0 ? (totalScore / totalMaxScore) * 100 : 0;
                
                return { overallMaturity, categoryScores, practiceScores, recommendations, answerCounts };
            }, [answers, data]);

            const radarChartData = {
                labels: Object.keys(scores.categoryScores),
                datasets: [{
                    label: 'Maturity Score (%)',
                    data: Object.values(scores.categoryScores),
                    backgroundColor: 'rgba(79, 70, 229, 0.2)',
                    borderColor: 'rgba(79, 70, 229, 1)',
                    borderWidth: 2,
                }],
            };

            const barChartData = {
                labels: Object.keys(scores.practiceScores).sort((a,b) => scores.practiceScores[b] - scores.practiceScores[a]),
                datasets: [{
                    label: 'Maturity Score (%)',
                    data: Object.keys(scores.practiceScores).sort((a,b) => scores.practiceScores[b] - scores.practiceScores[a]).map(p => scores.practiceScores[p]),
                    backgroundColor: Object.keys(scores.practiceScores).sort((a,b) => scores.practiceScores[b] - scores.practiceScores[a]).map(p => getScoreColor(scores.practiceScores[p])),
                    borderWidth: 1,
                }],
            };

            const doughnutChartData = {
                labels: ['Yes', 'Partial', 'Planned', 'No', "I Don't Know"],
                datasets: [{
                    data: [scores.answerCounts.yes, scores.answerCounts.partial, scores.answerCounts.planned, scores.answerCounts.no, scores.answerCounts.i_dont_know],
                    backgroundColor: ['#10B981', '#F59E0B', '#3B82F6', '#EF4444', '#6B7280'],
                }]
            };

            const RecommendationCard = ({ rec }) => {
                const colors = {
                    no: 'border-red-500',
                    i_dont_know: 'border-slate-500',
                    planned: 'border-blue-500',
                    partial: 'border-yellow-500',
                };
                return (
                    <div className={`p-4 rounded-lg border-l-4 ${colors[rec.answer]} bg-slate-50`}>
                        <p className="font-semibold text-slate-800">{rec.text}</p>
                        <p className="text-sm text-slate-500 mt-1">
                            Area: <span className="font-medium">{rec.category} &gt; {rec.practice}</span>
                        </p>
                         <p className="text-xs text-slate-400 mt-1">
                            Question: "{rec.question}" (Answered: <span className="font-medium capitalize">{rec.answer.replace(/_/g, ' ')}</span>)
                        </p>
                    </div>
                );
            };

            return (
                <div className="bg-white rounded-xl shadow-lg p-6 md:p-8">
                    <div ref={reportRef}>
                        <div className="flex justify-between items-start mb-8">
                            <div>
                                <h2 className="text-4xl font-extrabold text-slate-800 mb-2">Zero Trust Enabled AppSec Maturity</h2>
                                <p className="text-lg text-slate-500">Executive Summary</p>
                            </div>
                            <div id="report-buttons" className="flex gap-2">
                                <button onClick={onBack} className="bg-slate-600 text-white px-4 py-2 rounded-lg hover:bg-slate-700 transition duration-300 flex items-center space-x-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clipRule="evenodd" /></svg>
                                    <span>Back</span>
                                </button>
                                <button onClick={handleDownloadPdf} disabled={isDownloading} className="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition duration-300 flex items-center space-x-2 disabled:bg-indigo-300">
                                   <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M17.707 9.293a1 1 0 010 1.414l-7 7a1 1 0 01-1.414 0l-7-7a1 1 0 011.414-1.414L9 14.586V3a1 1 0 012 0v11.586l4.293-4.293a1 1 0 011.414 0z" /></svg>
                                    <span>{isDownloading ? 'Downloading...' : 'Download PDF'}</span>
                                </button>
                            </div>
                        </div>

                        {/* Top Row KPIs */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                            <div className="bg-slate-50 rounded-lg p-6 flex flex-col items-center justify-center text-center">
                                <h3 className="text-xl font-semibold text-slate-600 mb-2">Overall Maturity</h3>
                                <p className="text-6xl font-bold text-indigo-600">{scores.overallMaturity.toFixed(1)}%</p>
                            </div>
                            <div className="md:col-span-2 bg-slate-50 rounded-lg p-6">
                                 <h3 className="text-xl font-semibold text-slate-600 mb-4 text-center">Answer Distribution</h3>
                                 <div className="h-48">
                                    <ChartComponent type="doughnut" data={doughnutChartData} options={{ maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }} />
                                 </div>
                            </div>
                        </div>
                        
                        {/* Status Overview */}
                        <StatusOverview data={data} answers={answers} sammScores={scores.categoryScores} />

                        {/* Detailed Charts */}
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-8">
                            <div className="bg-slate-50 rounded-lg p-6">
                                <h3 className="text-xl font-semibold text-slate-600 mb-4 text-center">SAMM Category Maturity</h3>
                                <div className="h-80">
                                    <ChartComponent type="radar" data={radarChartData} options={{ maintainAspectRatio: false, scales: { r: { beginAtZero: true, max: 100 } } }} />
                                </div>
                            </div>
                            <div className="bg-slate-50 rounded-lg p-6">
                                <h3 className="text-xl font-semibold text-slate-600 mb-4 text-center">Practice Maturity (Sorted)</h3>
                                <div className="h-96">
                                    <ChartComponent type="bar" data={barChartData} options={{ maintainAspectRatio: false, indexAxis: 'y', scales: { x: { beginAtZero: true, max: 100 } }, plugins: { legend: { display: false } } }} />
                                </div>
                            </div>
                        </div>

                        {/* NEW: Tenant Overview Cards */}
                        <NistTenantOverview data={data} answers={answers} />

                        {/* Recommendations */}
                        <div className="mt-8">
                            <h3 className="text-3xl font-bold text-slate-700 mb-6">Prioritized Mitigation Plan</h3>
                            <div className="mb-8">
                                <h4 className="text-xl font-semibold text-red-700 mb-4">High-Impact Actions</h4>
                                <div className="space-y-4">
                                    {scores.recommendations.highImpact.length > 0 ? scores.recommendations.highImpact.map((rec, i) => <RecommendationCard key={i} rec={rec} />) : <p className="text-sm text-slate-500">No high-impact items identified. Great work!</p>}
                                </div>
                            </div>
                            <div>
                                <h4 className="text-xl font-semibold text-blue-700 mb-4">Continuous Improvement</h4>
                                 <div className="space-y-4">
                                    {scores.recommendations.continuous.length > 0 ? scores.recommendations.continuous.map((rec, i) => <RecommendationCard key={i} rec={rec} />) : <p className="text-sm text-slate-500">No items for continuous improvement identified.</p>}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };


        // --- MAIN APP COMPONENT ---
        function App() {
            const [answers, setAnswers] = useState({});
            const [isReportView, setReportView] = useState(false);
            const [data, setData] = useState(null);
            const [showUnansweredModal, setShowUnansweredModal] = useState(false);
            
            const allQuestions = useMemo(() => {
                if (!data) return [];
                return data.categories.flatMap(cat => 
                    cat.practices.flatMap(prac => 
                        prac.questions.map(q => ({...q, practiceName: prac.name, categoryName: cat.name}))
                    )
                );
            }, [data]);

            const unansweredQuestions = useMemo(() => {
                return allQuestions.filter(q => !answers.hasOwnProperty(q.id));
            }, [answers, allQuestions]);


            useEffect(() => {
                setData(assessmentData);
            }, []);

            const handleAnswer = (questionId, answer) => {
                setAnswers(prev => ({ ...prev, [questionId]: answer }));
            };
            
            const jumpToQuestion = (questionId) => {
                const element = document.getElementById(`question-${questionId}`);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    element.classList.add('highlight-jump');
                    setTimeout(() => element.classList.remove('highlight-jump'), 2000);
                }
                setShowUnansweredModal(false);
            };

            const handleSubmit = () => {
                if (unansweredQuestions.length > 0) {
                    setShowUnansweredModal(true);
                } else {
                    setReportView(true);
                    window.scrollTo(0, 0);
                }
            };

            const handleBackToQuestions = () => {
                setReportView(false);
                window.scrollTo(0, 0);
            };

            if (!data) {
                return <div className="flex justify-center items-center h-screen text-lg font-semibold">Loading Assessment...</div>;
            }

            return (
                <div className="flex">
                    <Sidebar />
                    <main className="w-full md:ml-[25%] lg:ml-[20%] bg-slate-50 min-h-screen">
                        <div className="p-4 md:p-8">
                            {isReportView ? (
                                <Report answers={answers} data={data} onBack={handleBackToQuestions} />
                            ) : (
                                <>
                                    {showUnansweredModal && <UnansweredModal questions={unansweredQuestions} onJumpTo={jumpToQuestion} onClose={() => setShowUnansweredModal(false)} />}
                                    <MainHeader answered={Object.keys(answers).length} total={allQuestions.length} onSubmit={handleSubmit} />
                                    <Introduction />
                                    {data.categories.map(category => (
                                        <CategoryCard key={category.id} category={category}>
                                            {category.practices.map(practice => (
                                                <PracticeCard key={practice.id} practice={practice}>
                                                    {practice.questions.map(question => (
                                                        <Question
                                                            key={question.id}
                                                            question={question}
                                                            answer={answers[question.id]}
                                                            onAnswer={handleAnswer}
                                                            isUnanswered={!answers.hasOwnProperty(question.id)}
                                                        />
                                                    ))}
                                                </PracticeCard>
                                            ))}
                                        </CategoryCard>
                                    ))}
                                </>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>
</html>
